# CI: lint + tests on pull requests and on pushes to main.
#
# Block merges until green: Settings → Branches → Branch protection rule on `main`
# → "Require status checks to pass before merging" → search and add: lint, test
# (PRs from forks: secrets are limited; see GitHub docs for forked PR workflows.)
#
# SonarCloud / SonarQube: add sonar-project.properties, repo secrets SONAR_TOKEN, and
# a job using SonarSource/sonarcloud-github-action (org + projectKey in properties file).

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm test
