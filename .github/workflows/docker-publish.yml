# Build & test Java backend; push image to Docker Hub on main / manual runs.
# Add repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (access token from hub.docker.com).

name: Docker Hub

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/docker-publish.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  java-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: backend/pom.xml
      - name: Maven verify
        run: mvn -B verify

  docker-push:
    runs-on: ubuntu-latest
    needs: [java-test]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todoapp-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/todoapp-backend:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
