# Deploy the static site in /public to GitHub Pages.
#
# First time only (required by GitHub before this workflow can succeed):
#   Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions" → Save.
#   If that is still "Deploy from a branch", the Pages API returns 404 and deploy fails.
# Site URL: Settings → Pages after the first successful run.
#
# Optional: to auto-enable Pages from CI you need a PAT with repo scope as a secret and
# actions/configure-pages with enablement: true (GITHUB_TOKEN cannot enable Pages).

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
          # Include .nojekyll (dotfiles are excluded by default in this action).
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
